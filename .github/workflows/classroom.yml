name: Autograding

on: [push]

jobs:
  grade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout student repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Checkout hidden tests
        uses: actions/checkout@v5
        with:
          repository: sst-cs/wt-assignment-2-tests
          token: ${{ secrets.HIDDEN_TESTS_TOKEN }}
          path: grader

      - name: Run tests and capture score
        id: grader
        run: |
          node grader/test.js > test_output.txt 2>&1 || true
          cat test_output.txt
          
          # Extract Raw Score
          RAW_SCORE=$(grep -oP 'Raw Score: \K[0-9]+' test_output.txt || echo "0")
          
          # Scale to 10 points
          SCORE=$(( (RAW_SCORE * 10) / 30 ))
          
          STATUS="pass"
          if [ "$SCORE" -lt 5 ]; then STATUS="fail"; fi
          
          # Create JSON Payload for GitHub Classroom (including required 'tests' array to prevent reporter crash)
          JSON="{\"test_name\":\"Web Tech Tests\",\"status\":\"$STATUS\",\"max_score\":10,\"score\":$SCORE,\"tests\":[{\"name\":\"Web Tech Tests\",\"status\":\"$STATUS\",\"score\":$SCORE,\"max_score\":10}],\"output\":\"Detailed logs are available in the Actions tab.\"}"
          B64=$(echo -n "$JSON" | base64 -w 0)
          echo "result=$B64" >> $GITHUB_OUTPUT

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        env:
          GRADER_RESULTS: "${{steps.grader.outputs.result}}"
        with:
          runners: grader
