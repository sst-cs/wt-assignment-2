name: Autograding

on: [push]

jobs:
  grade:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      actions: read
      contents: read
      statuses: write

    steps:
      - name: Checkout student repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Checkout hidden tests
        uses: actions/checkout@v5
        with:
          repository: sst-cs/wt-assignment-2-tests
          token: ${{ secrets.HIDDEN_TESTS_TOKEN }}
          path: grader

      - name: Run tests and capture score
        id: grader
        run: |
          node grader/test.js > test_output.txt 2>&1 || true
          cat test_output.txt
          
          # Extract Final Score (already scaled to 10 by test.js)
          SCORE=$(grep -oP 'Final Score: \K[0-9]+' test_output.txt || echo "0")
          echo "Final Score Extracted: $SCORE"
          
          # Generate 10 virtual runners to represent partial credit (1 point each)
          for i in $(seq 1 10); do
            STATUS="fail"
            SCORE_VAL=0
            if [ $i -le $SCORE ]; then STATUS="pass"; SCORE_VAL=1; fi
            JSON="{\"version\":1,\"status\":\"$STATUS\",\"max_score\":1, \"tests\":[{\"name\":\"Requirement $i\",\"status\":\"$STATUS\",\"score\":$SCORE_VAL,\"max_score\":1}]}"
            B64=$(echo -n "$JSON" | base64 -w 0)
            echo "R${i}_RESULTS=$B64" >> $GITHUB_ENV
          done

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        continue-on-error: true
        with:
          runners: r1,r2,r3,r4,r5,r6,r7,r8,r9,r10
